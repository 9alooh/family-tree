.toolbar-scroll-wrap {

}
.toolbar-scroll-wrap::-webkit-scrollbar { display: none; }

[class*="top-5"][class*="overflow-x-auto"] {

}

/* ── 2. STATS BAR: permanently pinned full-width bottom bar ─ */

  position: fixed !important;
  bottom: 0 !important;
  left: 0 !important;
  right: 0 !important;
